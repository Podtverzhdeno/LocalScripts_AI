<!DOCTYPE html>
<html>
<head>
    <title>Test Buttons</title>
    <style>
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #9ca3af;
            padding: 8px 24px;
            cursor: pointer;
        }
        .mode-btn-active {
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(6,182,212,0.2));
            border-color: rgba(16,185,129,0.5);
            color: #10b981;
            font-weight: 600;
        }
    </style>
</head>
<body style="background: #0a0f1a; color: white; padding: 50px;">
    <h1>Button Test</h1>

    <div style="margin: 20px 0;">
        <button id="quickModeBtn" onclick="switchMode('quick')" class="mode-btn mode-btn-active">
            ⚡ Quick Mode
        </button>
        <button id="projectModeBtn" onclick="switchMode('project')" class="mode-btn">
            🏗️ Project Mode
        </button>
    </div>

    <div id="output" style="margin-top: 20px; padding: 10px; background: #1a1a1a;"></div>

    <script>
        function switchMode(mode) {
            console.log('switchMode called with:', mode);
            document.getElementById('output').innerHTML = 'Mode switched to: ' + mode;

            const quickBtn = document.getElementById('quickModeBtn');
            const projectBtn = document.getElementById('projectModeBtn');

            if (mode === 'quick') {
                quickBtn.classList.add('mode-btn-active');
                projectBtn.classList.remove('mode-btn-active');
            } else {
                projectBtn.classList.add('mode-btn-active');
                quickBtn.classList.remove('mode-btn-active');
            }
        }
    </script>
</body>
</html>
