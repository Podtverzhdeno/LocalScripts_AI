version: '3.8'

services:
  # LocalScript application with FastAPI server
  localscript:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localscript-app
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./config:/app/config
      - ./.veai:/app/.veai
    environment:
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
      - PYTHONUNBUFFERED=1
      # RAG settings (disabled by default for faster startup)
      - RAG_ENABLED=false
      # Clarifier settings (disabled to avoid event loop issues in Docker)
      - CLARIFIER_ENABLED=false
      # Test validation settings (tolerant mode for 7B models)
      - TEST_PASS_THRESHOLD=0.5
      # LowCode prompts optimization
      - USE_LOWCODE_PROMPTS=true
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - localscript-network

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: localscript-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - localscript-network
    # Uncomment if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
    driver: local

networks:
  localscript-network:
    driver: bridge
