# ============================================================
# Internal defaults. Users should configure via .env instead.
# Environment variables ALWAYS override these values.
# ============================================================

llm:
  backend: ollama            # fallback if LLM_BACKEND not in .env
  model: qwen2.5-coder:7b-instruct-q4_K_M    # fallback if LLM_MODEL not in .env (widely available)
  temperature: 0.2
  ollama_base_url: http://localhost:11434
  ollama_timeout: 120         # HTTP timeout for Ollama requests (seconds)

# Per-agent defaults (overridden by GENERATOR_BACKEND, REVIEWER_MODEL, etc. in .env)
# Optimized for 7B-12B models: use local models for simple tasks, cloud for complex reasoning
# IMPORTANT: All settings below are COMMENTED OUT by default.
# The system will use the default LLM from above unless you uncomment and configure per-agent overrides.
agents:
  generator:
    # backend: ollama
    # model: qwen2.5-coder:7b    # Fast local code generation
  validator:
    # backend: ollama
    # model: qwen2.5-coder:7b    # Fast local validation
  reviewer:
    # backend: openrouter
    # model: openai/gpt-4o-mini  # Stronger model for quality review
  retriever:
    # backend: ollama
    # model: qwen2.5-coder:7b    # Fast local RAG search
  approver:
    # backend: openrouter
    # model: openai/gpt-4o-mini  # Stronger model for relevance evaluation
  test_generator:
    # backend: ollama
    # model: qwen2.5-coder:7b    # Fast local test generation

# Reasoning strategies — enhance agent output quality via multi-step LLM reasoning.
# Applied to the generator agent before producing code.
# Set to "none" for direct LLM calls (zero overhead, default).
# Available: none, reflect (3 calls), cot (2 calls)
strategy:
  generator: none          # "none" | "reflect" | "cot"
  # reviewer: none         # future: strategies for reviewer agent

pipeline:
  max_iterations: 10
  execution_timeout: 10    # seconds for lua execution
  sandbox_mode: lua        # "lua" (default, Lua-level isolation) | "docker" (full container isolation) | "none" (unsafe)

workspace:
  base_dir: workspace

# RAG (Retrieval-Augmented Generation) configuration
# Reduces hallucinations by retrieving relevant code examples
# NEW: Enhanced workflow with Retriever + Approver agents for 7B-12B models
rag:
  enabled: true                          # Enable/disable RAG system
  use_new_workflow: true                 # Use Retriever+Approver agents (recommended for small models)
  persist_directory: .veai/chroma        # Where to store vector DB
  embedding_model: all-MiniLM-L6-v2      # Fast, lightweight embeddings (384 dim)
  collection_name: lua_knowledge         # ChromaDB collection name
  retrieval_k: 3                         # Number of examples to retrieve (optimized for 7B models)
  max_context_length: 1500               # Max chars for RAG context (optimized for 7B models)
  approval_threshold: 0.6                # Minimum confidence for approver to accept examples
  cache_enabled: true                    # Enable RAG result caching for similar tasks
  cache_max_size: 100                    # Maximum number of cached results

# External MCP tools that agents can use during generation (optional).
# Powered by langchain-mcp-adapters (official LangChain <-> MCP bridge).
# Supports stdio and http transports. Uncomment and configure as needed.
mcp_tools: []
  # Stdio transport (default) — launches a subprocess:
  # - name: filesystem
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "./workspace"]
  #   transport: stdio
  #
  # - name: web_search
  #   command: npx
  #   args: ["-y", "@anthropic/mcp-server-brave-search"]
  #   transport: stdio
  #   env:
  #     BRAVE_API_KEY: "your-key-here"
  #
  # HTTP transport — connects to a running MCP server:
  # - name: remote_tools
  #   url: "http://localhost:8000/mcp"
  #   transport: http
