# ============================================================
# Internal defaults. Users should configure via .env instead.
# Environment variables ALWAYS override these values.
# ============================================================

llm:
  backend: ollama     1         # fallback if LLM_BACKEND not in .env
  model: llama3.2              # fallback if LLM_MODEL not in .env (lightweight default)
  temperature: 0.2
  ollama_base_url: http://localhost:11434

# Per-agent defaults (overridden by GENERATOR_BACKEND, REVIEWER_MODEL, etc. in .env)
agents:
  generator: {}
  validator: {}
  reviewer: {}

pipeline:
  max_iterations: 3
  execution_timeout: 10    # seconds for lua execution

workspace:
  base_dir: workspace

# External MCP tools that agents can use during generation (optional).
# Each entry connects to an external MCP server via stdio.
# Uncomment and configure as needed.
mcp_tools: []
