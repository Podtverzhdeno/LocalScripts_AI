llm:
  backend: openrouter          # openai | ollama | openrouter | anthropic
  model: openai/gpt-4o-mini       # or llama3.2, codellama, etc.
  temperature: 0.2
  ollama_base_url: http://localhost:11434

# Per-agent LLM overrides (optional).
# If an agent has no override, it uses the default `llm:` config above.
# This enables hybrid pipelines: e.g. local model for generation, cloud for review.
agents:
  generator:           # writes Lua code
    # backend: ollama
    # model: qwen2.5-coder:7b
  validator:           # explains compilation/runtime errors
    # backend: ollama
    # model: qwen2.5-coder:7b
  reviewer:            # code quality review
    # backend: openrouter
    # model: openai/gpt-4o-mini

pipeline:
  max_iterations: 3
  execution_timeout: 10    # seconds for lua execution

workspace:
  base_dir: workspace

# External MCP tools that agents can use during generation (optional).
# Each entry connects to an external MCP server via stdio.
# Uncomment and configure as needed.
mcp_tools: []
  # - name: filesystem
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "./workspace"]
  # - name: web_search
  #   command: npx
  #   args: ["-y", "@anthropic/mcp-server-brave-search"]
  #   env:
  #     BRAVE_API_KEY: "your-key-here"
